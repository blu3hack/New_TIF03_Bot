  <linearGradient id="blue-top" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3a7fc1"/>
    <stop offset="100%" stop-color="#1a5d9a"/>
  </linearGradient>
  <linearGradient id="blue-side" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#124a80"/>
    <stop offset="100%" stop-color="#0d3a65"/>
  </linearGradient>

  <linearGradient id="green-face" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#4a8c2a"/>
    <stop offset="100%" stop-color="#2d6016"/>
